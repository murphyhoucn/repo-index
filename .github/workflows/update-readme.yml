name: Update Repository Index

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger from the GitHub UI
  push:
    branches:
      - main
    paths-ignore:
      - "README.md" # Avoid triggering on the auto-generated commit

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push the updated README

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate README
        env:
          # Prefer a personal access token (GH_PAT) with `repo` scope so that
          # private repositories are included in the index.  Falls back to the
          # default GITHUB_TOKEN, which only lists public repositories.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_readme.py

      - name: Commit and push updated README
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Only commit if README.md actually changed
          git diff --staged --quiet || git commit -m "chore: update repository index"
          git push
